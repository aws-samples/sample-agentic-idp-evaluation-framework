<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>IDP Evaluation Framework</title>
    <meta name="description" content="Evaluate, compare, and recommend the optimal AWS document processing approach for your use case." />
    <style>
      html, body { margin: 0; padding: 0; height: 100%; background: #fafbfc; color: #16191f; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; -webkit-font-smoothing: antialiased; }
      #app-splash { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; z-index: 9999; background: #fafbfc; transition: opacity 200ms ease; }
      #app-splash.hidden { opacity: 0; pointer-events: none; }
      #app-splash .logo { width: 48px; height: 48px; border-radius: 10px; background: linear-gradient(135deg, #0972d3 0%, #1a66ad 100%); display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 18px; letter-spacing: 0.5px; box-shadow: 0 4px 12px rgba(9, 114, 211, 0.25); }
      #app-splash .spinner { width: 28px; height: 28px; border: 2.5px solid rgba(9, 114, 211, 0.15); border-top-color: #0972d3; border-radius: 50%; animation: app-splash-spin 720ms linear infinite; }
      #app-splash .label { font-size: 13px; color: #5f6b7a; letter-spacing: 0.15px; font-weight: 500; }
      #app-splash .sublabel { font-size: 12px; color: #95a5ba; margin-top: -10px; }
      @keyframes app-splash-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      @media (prefers-color-scheme: dark) {
        html, body, #app-splash { background: #0f1419; color: #e9ebed; }
        #app-splash .label { color: #a2a9b0; }
        #app-splash .sublabel { color: #5f6b7a; }
      }
    </style>
  </head>
  <body>
    <div id="app-splash" role="status" aria-live="polite" aria-label="Loading ONE IDP">
      <div class="logo">IDP</div>
      <div class="spinner"></div>
      <div class="label">Loading…</div>
      <div class="sublabel">One moment.</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
